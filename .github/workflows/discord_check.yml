name: Discord Channel Check

on:
  push:
    branches:
      - master
    paths:
      - "bot.py"
      - ".github/workflows/discord_check.yml"
      - "requirements.txt"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python -c "import os; missing=[k for k in ['DISCORD_TOKEN','LINE_CHANNEL_ACCESS_TOKEN','LINE_USER_ID'] if not os.environ.get(k)]; print('Missing secrets: ' + ', '.join(missing) if missing else 'All required secrets are present'); raise SystemExit(1 if missing else 0)"

      - name: Restore discord cache
        uses: actions/cache@v4
        with:
          path: discord_last_messages.json
          key: discord-last-messages-${{ github.run_id }}
          restore-keys: discord-last-messages-

      - name: Run discord check
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python bot.py

      - name: Save discord cache
        uses: actions/cache/save@v4
        with:
          path: discord_last_messages.json
          key: discord-last-messages-${{ github.run_id }}
